<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     
   
    <div id="container">
         <h1>BMI CALCULATOR</h1>
         
        <form action="">
            <p id="first"><label>Height in cm :</label><input type="text" id="height"></p>
            <p id="second"><label>Weight in km :</label><input type="text" id="weight"></p>
            <div class="mid"><button id="Btn">Calculate</button></div>
            <div id="results"></div>
            <div id="guide">
                <h3>BMI Weight Guide</h3>
                <p class="bottom">Under Weight = Less than 18.6</p>
                <p class="bottom">Normal Range = 18.6 and 24.9</p>
                <p class="bottom">Overweight = Greater than 24.9</p>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
